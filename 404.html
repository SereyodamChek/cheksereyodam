<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Page not found — Sereyodam Chek's portfolio." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link id="favicon" rel="shortcut icon" href="./assets/img/sdcicon.svg" />
    <link rel="stylesheet" href="src/404.css" />
    <title>404 · Page Not Found — Sereyodam Chek</title>
</head>

<body>
    <div class="bg-orbs" aria-hidden="true">
        <span class="orb orb-1"></span>
        <span class="orb orb-2"></span>
        <div class="bg-grid"></div>
    </div>

    <section class="error">
        <div class="error-inner">
            <div class="error-code" aria-label="404">
                <span>4</span>
                <span class="zero">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0" stop-color="#a78bfa" />
                                <stop offset="1" stop-color="#ec4899" />
                            </linearGradient>
                        </defs>
                        <circle cx="100" cy="100" r="82" fill="none" stroke="url(#g)" stroke-width="16" />
                        <circle cx="100" cy="100" r="48" fill="none" stroke="url(#g)" stroke-width="8" opacity="0.5" />
                    </svg>
                </span>
                <span>4</span>
            </div>
            <p class="eyebrow"><span class="dot"></span> Lost in space</p>
            <h1>This page doesn't <em>exist</em>.</h1>
            <p class="lead">The link you followed may be broken, or the page may have been moved. Let's take you back home.</p>
            <div class="actions">
                <a class="btn btn-premium" href="/">
                    <span>Back to home</span>
                    <i class="fa-solid fa-arrow-right-long"></i>
                </a>
                <a class="btn btn-ghost" href="mailto:strongmandom@gmail.com">
                    <span>Report an issue</span>
                    <i class="fa-regular fa-envelope"></i>
                </a>
            </div>
        </div>
    </section>
</body>

</html>
